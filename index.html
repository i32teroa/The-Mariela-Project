<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Mariela Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Top bar with CEFR buttons -->
        <div class="top-bar">
            <!-- Left spacer (pushes map group to center) -->
            <div class="spacer"></div>
            
            <!-- Map buttons group (centered) -->
            <div class="map-buttons-group">
                <button class="map-btn" data-map="A1" disabled>A1 🔒</button>
                <button class="map-btn" data-map="A2" disabled>A2 🔒</button>
                <button class="map-btn active" data-map="B1">B1</button>
                <button class="map-btn" data-map="B2" disabled>B2 🔒</button>
                <button class="map-btn" data-map="C1" disabled>C1 🔒</button>
                <button class="map-btn" data-map="C2" disabled>C2 🔒</button>
                <button class="search-btn" id="searchBtn">🔍</button>
                            <label class="toggle-label">
                <input type="checkbox" id="showHiddenToggle"> 🔓 Show locked
            </label>
            </div>
            
            <!-- Right spacer (pushes map group to center, toggle to far right) -->
            <div class="spacer"></div>
        </div>

        <div class="map-container">
            <svg id="lineCanvas" class="line-canvas" style="position: absolute; top: 0; left: 0; width: 2000px; height: 2000px; pointer-events: none;" viewBox="0 0 2000 2000"></svg>
            <div id="skillTreeGrid" class="skill-tree"></div>
        </div>

        <!-- Node detail modal (hidden until a node is clicked) -->
        <div id="nodeModal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2 id="modalTitle">Node Title</h2>
                <div id="modalExplanation">Explanation goes here...</div>
                <button id="modalPlayBtn" class="play-btn">Start Level</button>
                <div id="modalPrereq" class="prereq-warning"></div>
            </div>
        </div>

        <!-- Exercise screen (hidden until play clicked) -->
        <div id="exerciseScreen" class="exercise-screen hidden">
            <div class="exercise-header">
                <button id="backToNodeBtn">← Back to map</button>
                <h2 id="exerciseTitle">Exercises</h2>
            </div>
            <div id="exerciseExplanation" class="exercise-explanation"></div>
            <button id="startExerciseBtn" class="start-exercise-btn">Start Exercise</button>
            <div id="questionsContainer" class="questions-container hidden"></div>
            <button id="submitExerciseBtn" class="submit-btn hidden">Submit Answers</button>
            <div id="exerciseFeedback" class="feedback"></div>
        </div>
        <!-- Explanation Book (pop-up book style) -->
        <div id="bookScreen" class="book-screen hidden">
            <div class="book-container">
                <!-- Close button -->
                <button class="book-close-btn" id="bookCloseBtn">✕</button>
                
                <!-- Book content wrapper -->
                <div class="book-content">
                    <div class="book-page" id="bookPageLeft">
                        <h3 id="bookTitleLeft">Title</h3>
                        <div id="bookTextLeft" class="book-text"></div>
                    </div>
                    <div class="book-divider"></div>
                    <div class="book-page" id="bookPageRight">
                        <h3 id="bookTitleRight">Title</h3>
                        <div id="bookTextRight" class="book-text"></div>
                    </div>
                </div>
                
                <!-- Navigation footer -->
                <div class="book-footer">
                    <button class="book-nav-btn" id="bookPrevBtn">◀ Previous</button>
                    <span class="book-page-indicator" id="bookPageIndicator">Page 1 / 3</span>
                    <button class="book-nav-btn" id="bookNextBtn">Next ▶</button>
                </div>
                
                <!-- Start Exercise button (hidden until last page) -->
                <button class="book-start-btn hidden" id="bookStartBtn">▶ Start Exercises</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
